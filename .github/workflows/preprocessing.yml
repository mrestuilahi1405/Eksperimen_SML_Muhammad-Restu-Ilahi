name: Automated Data Preprocessing
on:
  push:
    branches: [ main ]
    paths: # Hanya jalan jika data atau preprocesssingnya berubah
      - 'creditrisk_raw.csv'
      - 'preprocessing/automate_Muhammad-Restu-Ilahi.py'

  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  
jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7' # Sesuai rekomendasi Tips & Trik

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn

      - name: Run Automate Preprocessing
        run: python preprocessing/automate_Muhammad-Restu-Ilahi.py

      - name: Commit and Push Clean Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/creditrisk_preprocessing.csv
          git commit -m "Update processed data: $(date)" || echo "No changes to commit"
          git push